<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .rule { display:flex; align-items:center; gap:14px; margin:16px 0; }
  .rule::before,.rule::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--brass),transparent); }
  .gem { color:var(--brass); font-size:15px; line-height:1; }
  .frame { height:42px; border:5px solid var(--brass); box-shadow: inset 0 0 0 2px var(--kumkum), inset 0 0 0 4px rgba(212,175,55,.35); border-radius:4px; margin-top:18px; }
  .lab { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--brass-dark); margin-top:8px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Brass Hairline Rules &amp; Border Frame</div>
  <div class="rule"><span class="gem">✦</span></div>
  <div class="rule"><span class="gem">❦</span></div>
  <div class="frame"></div>
  <div class="lab">Fixed frame: 5px brass + inset kumkum + inset gold .35</div>
</div></body></html>
