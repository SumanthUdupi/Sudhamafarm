<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background:#FDFBF7; }
  .sw { display:flex; flex-direction:column; gap:6px; }
  .chip { height:60px; border-radius:10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); }
  .nm { font-size:11px; font-weight:700; color:#2C1810; }
  .hex { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:#8B6347; letter-spacing:.02em; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:13px; }
  .grid2 { margin-top:14px; }
</style></head>
<body><div class="card">
  <div class="eyebrow" style="color:#B8943A">Folio · Antique Paper Palette</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FDFBF7"></div><span class="nm">Paper</span><span class="hex">#FDFBF7</span></div>
    <div class="sw"><div class="chip" style="background:#F4E7C7"></div><span class="nm">Paper Warm</span><span class="hex">#F4E7C7</span></div>
    <div class="sw"><div class="chip" style="background:#EDD9A3"></div><span class="nm">Paper Sand</span><span class="hex">#EDD9A3</span></div>
    <div class="sw"><div class="chip" style="background:#F5C84A"></div><span class="nm">Gold Lt</span><span class="hex">#F5C84A</span></div>
  </div>
  <div class="grid grid2">
    <div class="sw"><div class="chip" style="background:#722F37"></div><span class="nm">Burgundy</span><span class="hex">#722F37</span></div>
    <div class="sw"><div class="chip" style="background:#4A1A20"></div><span class="nm">Burg Dark</span><span class="hex">#4A1A20</span></div>
    <div class="sw"><div class="chip" style="background:#2C0D12"></div><span class="nm">Burg Deep</span><span class="hex">#2C0D12</span></div>
    <div class="sw"><div class="chip" style="background:#8B6347"></div><span class="nm">Ink Lt</span><span class="hex">#8B6347</span></div>
  </div>
</div></body></html>
