<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:6px; }
  .chip { height:64px; border-radius:10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); }
  .nm { font-size:11px; font-weight:700; color:var(--ink); }
  .hex { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--ink-md); letter-spacing:.02em; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Glow · Primary Red (Kumkum)</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#3A000D"></div><span class="nm">Kumkum Deep</span><span class="hex">#3A000D</span></div>
    <div class="sw"><div class="chip" style="background:#5C0015"></div><span class="nm">Kumkum Dark</span><span class="hex">#5C0015</span></div>
    <div class="sw"><div class="chip" style="background:#800020"></div><span class="nm">Kumkum</span><span class="hex">#800020</span></div>
    <div class="sw"><div class="chip" style="background:#9A2030"></div><span class="nm">Kumkum Warm</span><span class="hex">#9A2030</span></div>
  </div>
</div></body></html>
