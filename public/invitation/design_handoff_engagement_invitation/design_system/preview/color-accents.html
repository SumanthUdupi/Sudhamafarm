<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:6px; }
  .chip { height:64px; border-radius:10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); }
  .nm { font-size:11px; font-weight:700; color:var(--ink); }
  .hex { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--ink-md); letter-spacing:.02em; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Accents · Marigold + Brass Gold</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#EAA221"></div><span class="nm">Marigold</span><span class="hex">#EAA221</span></div>
    <div class="sw"><div class="chip" style="background:#FFC30B"></div><span class="nm">Marigold Lt</span><span class="hex">#FFC30B</span></div>
    <div class="sw"><div class="chip" style="background:#D4AF37"></div><span class="nm">Brass</span><span class="hex">#D4AF37</span></div>
    <div class="sw"><div class="chip" style="background:#C5A059"></div><span class="nm">Brass Dark</span><span class="hex">#C5A059</span></div>
  </div>
</div></body></html>
