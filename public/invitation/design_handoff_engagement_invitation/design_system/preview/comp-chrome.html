<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .card.dark { display:flex; flex-direction:column; gap:20px; }
  .badge { align-self:flex-start; padding:12px 38px; border:1.5px solid var(--brass); border-radius:50px;
    font-family:var(--ff-display); font-size:13px; letter-spacing:.2em; color:var(--sandalwood-lt);
    background:rgba(0,0,0,.22); box-shadow:0 0 20px rgba(212,175,55,.12); }
  .pbar-track { height:3px; background:rgba(255,255,255,.12); border-radius:2px; overflow:hidden; }
  .pbar { height:100%; width:62%; background:linear-gradient(90deg,var(--kumkum),var(--brass),var(--marigold)); }
  .dots { display:flex; gap:10px; }
  .dot { width:9px; height:9px; border-radius:50%; border:1.5px solid var(--brass); }
  .dot.on { background:var(--brass); transform:scale(1.4); }
  .tag { font-family:ui-monospace,Menlo,monospace; font-size:9px; color:var(--marigold); }
</style></head>
<body><div class="card dark">
  <div class="eyebrow">Badge · Progress bar · Nav dots</div>
  <div class="badge">✦&nbsp; 12<sup>TH</sup> JULY 2026 &nbsp;·&nbsp; NAGOOR, UDUPI &nbsp;✦</div>
  <div><div class="tag" style="margin-bottom:6px">scroll progress · kumkum → brass → marigold</div><div class="pbar-track"><div class="pbar"></div></div></div>
  <div><div class="tag" style="margin-bottom:8px">section nav dots (active = filled + 1.4×)</div><div class="dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
</div></body></html>
