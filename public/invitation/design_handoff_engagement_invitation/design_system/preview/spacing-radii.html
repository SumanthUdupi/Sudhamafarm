<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:flex; gap:18px; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .box { width:96px; height:62px; background:var(--sandalwood); border:1.5px solid var(--brass); }
  .nm { font-size:11px; font-weight:700; color:var(--ink); }
  .val { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--ink-md); }
</style></head>
<body><div class="card">
  <div class="eyebrow">Corner Radii</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:14px"></div><span class="nm">Soft</span><span class="val">14px</span></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><span class="nm">Card</span><span class="val">16px</span></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><span class="nm">Feature</span><span class="val">20px</span></div>
    <div class="item"><div class="box" style="border-radius:50px"></div><span class="nm">Pill</span><span class="val">50px</span></div>
    <div class="item"><div class="box" style="border-radius:3px 12px 12px 3px"></div><span class="nm">Book spine</span><span class="val">3/12/12/3</span></div>
  </div>
</div></body></html>
