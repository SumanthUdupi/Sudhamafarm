<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background:#FDF6E9; }
  .stage { position:relative; background:linear-gradient(180deg,#FDF6E9,#F4E7C7);
    border:1px solid rgba(212,175,55,.3); border-radius:14px; padding:30px 22px; overflow:hidden; }
  /* faint emblem band — quiet background motif, sits behind content */
  .band { position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around;
    padding:0 6%; pointer-events:none; }
  .band::before, .band::after { content:''; position:absolute; left:6%; right:6%; height:1px; top:50%;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,.4),transparent); }
  .band svg { width:48px; height:48px; color:var(--kumkum); opacity:.16; }
  .stage { min-height:96px; }
  .meta { font-family:ui-monospace,Menlo,monospace; font-size:9px; color:var(--brass-dark); margin-top:14px; text-align:center; letter-spacing:.04em; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Pancha-Deva emblems · faint background motif — never a foreground icon row</div>
  <div class="stage">
    <div class="band" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.9"/><circle cx="24" cy="24" r="5" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="18" stroke="currentColor" stroke-width="2"/><line x1="24" y1="30" x2="24" y2="44" stroke="currentColor" stroke-width="2"/><line x1="4" y1="24" x2="18" y2="24" stroke="currentColor" stroke-width="2"/><line x1="30" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2"/><line x1="10.3" y1="10.3" x2="19.2" y2="19.2" stroke="currentColor" stroke-width="1.6"/><line x1="28.8" y1="28.8" x2="37.7" y2="37.7" stroke="currentColor" stroke-width="1.6"/><line x1="37.7" y1="10.3" x2="28.8" y2="19.2" stroke="currentColor" stroke-width="1.6"/><line x1="10.3" y1="37.7" x2="19.2" y2="28.8" stroke="currentColor" stroke-width="1.6"/></svg>
      <svg viewBox="0 0 48 48" fill="none"><line x1="24" y1="8" x2="24" y2="42" stroke="currentColor" stroke-width="2.4"/><path d="M24 16 Q14 11 12 7 Q14 13 24 18Z" fill="currentColor"/><path d="M24 16 Q34 11 36 7 Q34 13 24 18Z" fill="currentColor"/><line x1="15" y1="27" x2="33" y2="27" stroke="currentColor" stroke-width="2.2"/></svg>
      <svg viewBox="0 0 48 48" fill="none"><rect x="5" y="22" width="38" height="5" rx="2.5" fill="currentColor" transform="rotate(-16 24 24)"/><circle cx="13" cy="23" r="1.8" fill="currentColor" transform="rotate(-16 24 24)"/><circle cx="19" cy="23" r="1.8" fill="currentColor" transform="rotate(-16 24 24)"/><circle cx="25" cy="23" r="1.8" fill="currentColor" transform="rotate(-16 24 24)"/><circle cx="31" cy="23" r="1.8" fill="currentColor" transform="rotate(-16 24 24)"/></svg>
      <svg viewBox="0 0 48 48" fill="none"><line x1="24" y1="10" x2="24" y2="44" stroke="currentColor" stroke-width="2.4"/><polygon points="24,4 28,14 24,20 20,14" fill="currentColor"/><path d="M13 22 Q18 19 24 22 Q30 19 35 22 L33 24 Q30 22 24 24 Q18 22 15 24 Z" fill="currentColor"/></svg>
      <svg viewBox="0 0 48 48" fill="none"><line x1="24" y1="18" x2="24" y2="44" stroke="currentColor" stroke-width="2.6"/><ellipse cx="24" cy="12" rx="10" ry="10" fill="currentColor"/><circle cx="24" cy="12" r="3.5" fill="#D4AF37"/></svg>
    </div>
  </div>
  <div class="meta">Chakra · Trishul · Murali · Vel · Gada — washed to ~13% behind a brass hairline</div>
</div></body></html>
