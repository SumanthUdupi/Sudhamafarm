<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background:#FDF6E9; }
  .row { display:flex; align-items:center; justify-content:space-around; gap:14px; margin-top:8px; }
  .o { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .nm { font-family:ui-monospace,Menlo,monospace; font-size:9px; color:var(--brass-dark); }
  .garland { width:220px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Ornaments · kolam, garland, temple watermark</div>
  <div class="row">
    <div class="o"><img class="garland" src="../assets/icons/garland.svg" alt="garland"><span class="nm">garland.svg</span></div>
  </div>
  <div class="row" style="margin-top:14px">
    <div class="o"><img src="../assets/icons/kolam-corner.svg" width="64" alt="kolam"><span class="nm">kolam-corner.svg</span></div>
    <div class="o"><img src="../assets/icons/temple-watermark.svg" width="100" style="opacity:.5" alt="temple"><span class="nm">temple-watermark.svg</span></div>
    <div class="o"><img src="../assets/icons/scroll-cue.svg" width="20" alt="scroll cue"><span class="nm">scroll-cue.svg</span></div>
  </div>
</div></body></html>
