<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background:#FDF6E9; }
  .shloka { background:linear-gradient(145deg,rgba(253,246,233,.97),rgba(255,255,250,.99)); border:1.5px solid var(--brass);
    border-radius:16px; padding:22px 26px; text-align:center; position:relative;
    box-shadow:0 8px 50px rgba(212,175,55,.18), 0 2px 12px rgba(128,0,32,.08), inset 0 0 90px rgba(244,231,199,.5); }
  .gem { position:absolute; font-size:13px; color:var(--brass); opacity:.55; }
  .gem.tl{top:10px;left:12px} .gem.tr{top:10px;right:12px} .gem.bl{bottom:10px;left:12px} .gem.br{bottom:10px;right:12px}
  .crown { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:10px; }
  .crown svg { width:30px; height:30px; color:var(--kumkum); }
  .om { font-family:var(--ff-kannada); font-size:34px; color:var(--kumkum); line-height:1; }
  .kn { font-family:var(--ff-kannada); font-size:16px; color:var(--kumkum-dark); line-height:2; }
  .names { display:flex; justify-content:center; gap:26px; margin-top:10px; }
  .names span { font-family:var(--ff-body); font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--brass-dark); }
  .en { font-family:var(--ff-serif); font-style:italic; font-size:12px; color:var(--ink-md); line-height:1.8;
    border-top:1px solid rgba(212,175,55,.4); padding-top:12px; margin-top:12px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Shloka Card · two family kuladevatas · cream gradient, brass border, inset glow</div>
  <div class="shloka">
    <span class="gem tl">✦</span><span class="gem tr">✦</span><span class="gem bl">✦</span><span class="gem br">✦</span>
    <div class="crown">
      <svg viewBox="0 0 48 48" fill="none" aria-label="Chakra — Vishnu"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.9"/><circle cx="24" cy="24" r="5" fill="currentColor"/><circle cx="24" cy="24" r="2.8" fill="#D4AF37"/><line x1="24" y1="4" x2="24" y2="18" stroke="currentColor" stroke-width="2"/><line x1="24" y1="30" x2="24" y2="44" stroke="currentColor" stroke-width="2"/><line x1="4" y1="24" x2="18" y2="24" stroke="currentColor" stroke-width="2"/><line x1="30" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2"/><line x1="10.3" y1="10.3" x2="19.2" y2="19.2" stroke="currentColor" stroke-width="1.6"/><line x1="28.8" y1="28.8" x2="37.7" y2="37.7" stroke="currentColor" stroke-width="1.6"/><line x1="37.7" y1="10.3" x2="28.8" y2="19.2" stroke="currentColor" stroke-width="1.6"/><line x1="10.3" y1="37.7" x2="19.2" y2="28.8" stroke="currentColor" stroke-width="1.6"/></svg>
      <span class="om">ॐ</span>
      <svg viewBox="0 0 48 48" fill="none" aria-label="Vel — Karthikeya"><line x1="24" y1="10" x2="24" y2="44" stroke="currentColor" stroke-width="2.4"/><polygon points="24,4 28,14 24,20 20,14" fill="currentColor"/><path d="M13 22 Q18 19 24 22 Q30 19 35 22 L33 24 Q30 22 24 24 Q18 22 15 24 Z" fill="currentColor"/><circle cx="24" cy="40" r="4" stroke="#D4AF37" stroke-width="1.4" fill="none"/><circle cx="24" cy="40" r="1.8" fill="#D4AF37" opacity=".65"/></svg>
    </div>
    <div class="kn">ವಿಷ್ಣುಂ ಸ್ಕಂದಂ ಚ ದೇವೇಶೌ ನಮಾಮ್ಯಹಮ್ ||</div>
    <div class="names"><span>Lord Vishnu · ವಿಷ್ಣು</span><span>Lord Karthikeya · ಸ್ಕಂದ</span></div>
    <div class="en">"I bow to Lord Vishnu and Lord Karthikeya — the guardian deities of our two families — may they grace this auspicious hour."</div>
  </div>
</div></body></html>
