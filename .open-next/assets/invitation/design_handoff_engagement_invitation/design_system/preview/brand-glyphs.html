<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:flex; gap:20px; flex-wrap:wrap; margin-top:6px; }
  .g { display:flex; flex-direction:column; align-items:center; gap:6px; width:78px; }
  .glyph { font-size:34px; color:var(--brass); line-height:1; }
  .glyph.om { font-family:var(--ff-kannada); color:var(--kumkum); }
  .nm { font-size:10px; font-weight:700; color:var(--ink); }
  .cp { font-family:ui-monospace,Menlo,monospace; font-size:9px; color:var(--ink-md); }
</style></head>
<body><div class="card">
  <div class="eyebrow">Typographic glyph icons (no icon font — Unicode dingbats)</div>
  <div class="grid">
    <div class="g"><span class="glyph">✦</span><span class="nm">Gem</span><span class="cp">U+2726</span></div>
    <div class="g"><span class="glyph">❦</span><span class="nm">Fleuron</span><span class="cp">U+2766</span></div>
    <div class="g"><span class="glyph">❧</span><span class="nm">Leaf</span><span class="cp">U+2767</span></div>
    <div class="g"><span class="glyph om">ॐ</span><span class="nm">Om</span><span class="cp">U+0950</span></div>
    <div class="g"><span class="glyph">♪</span><span class="nm">Note</span><span class="cp">U+266A</span></div>
    <div class="g"><span class="glyph">↗</span><span class="nm">Arrow</span><span class="cp">U+2197</span></div>
  </div>
</div></body></html>
