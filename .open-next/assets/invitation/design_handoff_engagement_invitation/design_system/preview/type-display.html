<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .card.dark { padding:24px 28px; }
  .names { font-family:var(--ff-display); font-weight:700; font-size:58px; line-height:1; letter-spacing:.04em;
    color:var(--sandalwood); text-shadow:0 2px 24px rgba(0,0,0,.6), 0 0 70px rgba(212,175,55,.22); }
  .amp { font-family:var(--ff-serif); font-style:italic; font-size:30px; color:var(--brass); display:block; margin:2px 0; }
  .meta { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--marigold); margin-top:14px; letter-spacing:.04em; }
</style></head>
<body><div class="card dark">
  <div class="eyebrow">Display · Cinzel 700 — names &amp; titles</div>
  <div class="names">Sumanth<span class="amp">&amp;</span>Vindhya</div>
  <div class="meta">Cinzel · clamp(2.8rem → 6rem) · tracking .04em</div>
</div></body></html>
