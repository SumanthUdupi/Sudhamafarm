<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .title { font-family:var(--ff-display); font-size:30px; color:var(--kumkum); letter-spacing:.1em; }
  .sub { font-family:var(--ff-serif); font-style:italic; font-size:17px; color:var(--ink-md); margin-top:6px; }
  .prose { font-family:var(--ff-serif); font-style:italic; font-size:15px; color:var(--ink-md); line-height:1.85; margin-top:14px; max-width:560px; }
  .meta { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--brass-dark); margin-top:14px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Serif · Playfair Display Italic — prose voice</div>
  <div class="title">The Divine Presence</div>
  <div class="sub">Five Sacred Guardians bless this union</div>
  <p class="prose">"With hearts overflowing with gratitude, joy, and the fragrance of marigolds, the families joyfully invite you…"</p>
  <div class="meta">Playfair Display · italic · titles in Cinzel</div>
</div></body></html>
