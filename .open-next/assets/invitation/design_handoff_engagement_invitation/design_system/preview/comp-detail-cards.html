<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background:linear-gradient(180deg,#F4E7C7,#FDF6E9); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .dc { background:rgba(255,255,255,.93); border-radius:14px; padding:18px 10px; text-align:center; border-top:3px solid var(--kumkum); box-shadow:0 4px 20px rgba(0,0,0,.07); }
  .ic { display:flex; justify-content:center; margin-bottom:9px; }
  .ic svg { width:24px; height:24px; color:var(--kumkum); }
  .l { font-family:var(--ff-body); font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--brass-dark); }
  .v { font-family:var(--ff-display); font-size:14px; color:var(--kumkum); font-weight:600; margin-top:4px; }
  .s { font-family:var(--ff-serif); font-style:italic; font-size:11px; color:var(--ink-md); margin-top:3px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Detail Cards · 3px kumkum top-border, white surface, brass line marker</div>
  <div class="grid">
    <div class="dc">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3.5" y="5" width="17" height="15" rx="2"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6.5"/><line x1="16" y1="3" x2="16" y2="6.5"/><circle cx="12" cy="14.5" r="1.4" fill="#D4AF37" stroke="none"/></svg></span>
      <div class="l">Date</div><div class="v">12 July 2026</div><div class="s">ಆಷಾಢ ಮಾಸ</div>
    </div>
    <div class="dc">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2.5" y1="18" x2="21.5" y2="18"/><path d="M7 18 A5 5 0 0 1 17 18" fill="#D4AF37" fill-opacity=".18"/><line x1="12" y1="5" x2="12" y2="8"/><line x1="5.5" y1="8.5" x2="7.2" y2="10.2"/><line x1="18.5" y1="8.5" x2="16.8" y2="10.2"/><line x1="2.5" y1="14" x2="4.5" y2="14"/><line x1="19.5" y1="14" x2="21.5" y2="14"/></svg></span>
      <div class="l">Ceremony</div><div class="v">Morning</div><div class="s">Onwards</div>
    </div>
    <div class="dc">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21 C12 21 5 14.5 5 9.5 A7 7 0 0 1 19 9.5 C19 14.5 12 21 12 21 Z"/><circle cx="12" cy="9.5" r="2.3" fill="#D4AF37" stroke="none"/></svg></span>
      <div class="l">Venue</div><div class="v">Nagoor</div><div class="s">Udupi</div>
    </div>
    <div class="dc">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="14.5" r="6"/><polygon points="12,3 14.4,7 12,9 9.6,7" fill="#D4AF37" stroke="none"/><polygon points="12,3 14.4,7 12,9 9.6,7"/></svg></span>
      <div class="l">Occasion</div><div class="v">Engagement</div><div class="s">ನಿಶ್ಚಿತಾರ್ಥ</div>
    </div>
  </div>
</div></body></html>
