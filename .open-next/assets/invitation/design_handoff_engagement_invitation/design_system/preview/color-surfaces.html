<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:6px; }
  .chip { height:64px; border-radius:10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.1); }
  .nm { font-size:11px; font-weight:700; color:var(--ink); }
  .hex { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--ink-md); letter-spacing:.02em; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:13px; }
</style></head>
<body><div class="card">
  <div class="eyebrow">Surfaces + Ink (warm neutrals — no greys)</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FFFDF5"></div><span class="nm">Ivory</span><span class="hex">#FFFDF5</span></div>
    <div class="sw"><div class="chip" style="background:#FDF6E9"></div><span class="nm">Sandal Lt</span><span class="hex">#FDF6E9</span></div>
    <div class="sw"><div class="chip" style="background:#F4E7C7"></div><span class="nm">Sandalwood</span><span class="hex">#F4E7C7</span></div>
    <div class="sw"><div class="chip" style="background:#5C3317"></div><span class="nm" >Ink Md</span><span class="hex">#5C3317</span></div>
    <div class="sw"><div class="chip" style="background:#2A1510"></div><span class="nm">Ink</span><span class="hex">#2A1510</span></div>
  </div>
</div></body></html>
